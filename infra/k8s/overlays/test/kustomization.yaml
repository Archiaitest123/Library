apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: test-

resources:
  - ../../base/api-deployment.yaml
  - ../../base/api-service.yaml
  - ../../base/ingress.yaml
  - ../../base/configmap-secrets.yaml

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: library-api
      spec:
        replicas: 2
