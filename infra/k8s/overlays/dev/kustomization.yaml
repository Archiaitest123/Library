apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
  - ../../base/api-deployment.yaml
  - ../../base/api-service.yaml
  - ../../base/configmap-secrets.yaml

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: library-api
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: library-api
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "250m"
