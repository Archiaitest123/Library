parameters:
  - name: dotnetVersion
    type: string
    default: "8.0.x"
  - name: buildConfiguration
    type: string
    default: "Release"

steps:
  - task: UseDotNet@2
    displayName: "Install .NET SDK ${{ parameters.dotnetVersion }}"
    inputs:
      packageType: "sdk"
      version: "${{ parameters.dotnetVersion }}"

  - task: DotNetCoreCLI@2
    displayName: "Restore"
    inputs:
      command: "restore"

  - task: DotNetCoreCLI@2
    displayName: "Build"
    inputs:
      command: "build"
      arguments: "--configuration ${{ parameters.buildConfiguration }} --no-restore"
